# Vale configuration for farminggames.help & game-guide.club
# Checks English prose for AI-translation patterns, unnatural writing, style issues
# Uses: Microsoft Writing Style Guide, write-good, + custom Translationese rules

StylesPath = styles
MinAlertLevel = suggestion

# Official style packages
Packages = Microsoft, write-good

[*.md]
# Base styles + our custom Translationese rules for detecting AI/translation patterns
BasedOnStyles = Microsoft, write-good, Translationese

# ── Microsoft style – selectively enable rules useful for game guides ──
Microsoft.Accessibility   = NO
Microsoft.Adverbs         = NO    # too many false positives for game guides
Microsoft.AMPM            = NO
Microsoft.Auto            = NO    # hyphenation rules too strict for creative writing
Microsoft.Contractions    = NO    # game guides should use contractions! (don't flag)
Microsoft.Dashes          = NO    # spaced em dashes are fine for game guides
Microsoft.DateOrder       = NO
Microsoft.Ellipses        = NO
Microsoft.FirstPerson     = NO    # game guides use "I/my" naturally
Microsoft.Headings        = NO
Microsoft.HeadingAcronyms = NO
Microsoft.HeadingPunctuation = NO
Microsoft.Hyphens         = NO
Microsoft.Ordinal         = NO
Microsoft.OxfordComma     = NO
Microsoft.Passive         = YES
Microsoft.Quotes          = NO
Microsoft.RangeTime       = NO
Microsoft.SentenceLength  = YES
Microsoft.Spacing         = NO
Microsoft.Suspended       = NO
Microsoft.URLFormat       = NO
Microsoft.Vocab           = YES
Microsoft.We              = YES
Microsoft.Wordiness       = YES
Microsoft.Write           = NO

# ── write-good – useful prose checks ──
write-good.Epitext   = NO   # "in conclusion" etc. - too strict for wiki
write-good.Illusions = YES  # repeated words
write-good.Meta      = NO   # meta commentary check - too strict
write-good.Passive   = YES
write-good.So        = NO   # starting sentences with "So" is fine
write-good.ThereIs   = YES
write-good.TooWordy  = YES
write-good.Weasel    = YES
write-good.E-Prime   = NO   # avoiding "is/are" is impossible in game guides
write-good.Cliches   = YES

# ── Format handling ──
# Ignore frontmatter (YAML between ---), code blocks, and tables
BlockIgnores = (?s)```.*?```, (?s)^---\n[\s\S]*?\n---, (\|.*?\|)+
TokenIgnores = (<!--.*?-->)

# Paths to skip
IgnoredPaths = site/, node_modules/, .git/, venv/, __pycache__/
