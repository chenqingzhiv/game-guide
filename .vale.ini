# Vale configuration for farminggames.help
# Checks English prose for AI-translation patterns and unnatural writing

StylesPath = styles
MinAlertLevel = suggestion

[*.md]
# Microsoft style catches formality issues; write-good catches weasel words/passive voice
BasedOnStyles = Translationese

# Ignore code blocks and tables
BlockIgnores = (?s)```.*?```, (\|.*?\|)+

# Paths to ignore
IgnoredPaths = site/, node_modules/, .git/, venv/, __pycache__/
