site_name: Game Guide Club
site_url: https://game-guide.club
site_description: Complete guides, databases & interactive tools for factory automation, survival building, and strategy games
site_author: game-guide

theme:
  name: material
  custom_dir: overrides
  language: en
  palette:
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/lightbulb
        name: Switch to light mode
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/lightbulb-outline
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - header.autohide

plugins:
  - search
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      cache_safe: true
  - glightbox
  - redirects:
      redirect_maps:
        timberborn.md: timberborn/index.md
        factorio.md: factorio/index.md
        dyson.md: dyson/index.md
        shapez2.md: shapez2/index.md

extra_javascript:
  - assets/vendor/jquery.min.js
  - assets/vendor/datatables.js
  - assets/js/datatables-init.js

extra_css:
  - assets/css/custom.css
  - assets/vendor/datatables.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html

extra:
  generator: false

copyright: Copyright &copy; 2026 Factory Game Guides

nav:
  - 🏠 Home: index.md
  - 🛠️ Tools:
    - tools/index.md
  - 🏭 Factory Games:
    - ⚙️ Satisfactory:
      - satisfactory/index.md
      - satisfactory/lines.md
      - satisfactory/tiers.md
      - satisfactory/power.md
      - satisfactory/resources.md
      - satisfactory/building.md
      - satisfactory/parts.md
    - 💡 Factorio:
      - factorio/index.md
      - factorio/production-ratios.md
      - factorio/rail-system.md
      - factorio/circuits.md
      - factorio/strategies.md
      - factorio/mods.md
    - 🌌 Dyson Sphere:
      - dyson/index.md
      - dyson/production.md
      - dyson/logistics.md
      - dyson/sphere-design.md
    - 🌿 Timberborn:
      - timberborn/index.md
      - timberborn/water.md
      - timberborn/food.md
      - timberborn/buildings.md
      - timberborn/districts.md
      - timberborn/beavers.md
    - ⬡ Shapez 2:
      - shapez2/index.md
      - shapez2/shapes.md
      - shapez2/buildings.md
      - shapez2/logic.md
    - 🎮 Game Comparison: games/comparison.md
  - 🌟 Survival & Building:
    - ⚔️ Valheim: valheim/index.md
    - 🔥 Enshrouded: enshrouded/index.md
    - 🩸 V Rising: vrising/index.md
    - 🌲 Sons of the Forest: sons-forest/index.md
  - 📬 Feedback: feedback/index.md
