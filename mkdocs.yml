site_name: Game Guide
site_url: https://game-guide.club
site_description: 游戏攻略数据库 - 装备/角色/地图/任务一站式查询
site_author: game-guide

theme:
  name: material
  language: zh
  palette:
    - scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/lightbulb
        name: 切换到亮色模式
    - scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/lightbulb-outline
        name: 切换到深色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - header.autohide

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/
  generator: false

copyright: Copyright &copy; 2026 Game Guide

nav:
  - 🏠 首页: index.md
  - 📖 游戏数据库:
    - 总览: database/index.md
  - 📝 攻略指南:
    - 总览: guides/index.md
  - 📰 更新日志: news/index.md
  - ℹ️ 关于本站: about.md
