site_name: Game Guide Club
site_url: https://game-guide.club
site_description: Complete guides, databases & interactive tools for factory automation, survival building, and strategy games
site_author: game-guide

theme:
  name: material
  logo: material/factory
  favicon: assets/img/og-image.png
  language: en
  custom_dir: overrides
  palette:
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/lightbulb
        name: Switch to light mode
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/lightbulb-outline
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - header.autohide

plugins:
  - search
  - git-revision-date-localized:
      enabled: true
      type: timeago
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      cache_safe: true
  - glightbox
  - redirects:
      redirect_maps:
        timberborn.md: timberborn/index.md
        factorio.md: factorio/index.md
        dyson.md: dyson/index.md
        shapez2.md: shapez2/index.md
        grounded.md: grounded/index.md

extra_javascript:
  - assets/vendor/jquery.min.js
  - assets/vendor/datatables.js
  - assets/js/datatables-init.js
  - assets/js/tools/production-calc.js
  - assets/js/tools/power-planner.js
  - assets/js/tools/boss-tracker.js
  - assets/js/tools/factory-planner.js
  - assets/js/tools/game-map.js

extra_css:
  - assets/css/custom.css
  - assets/vendor/datatables.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html

extra:
  generator: false

copyright: Copyright &copy; 2026 Factory Game Guides

